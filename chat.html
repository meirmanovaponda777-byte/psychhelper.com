<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsychHelp Chat</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../chat.css">
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <h2>PsychHelp</h2>
        <p>Место, где можно быть собой</p>
    </div>

    <div class="chat-box" id="chatBox">
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Напишите сообщение..." autocomplete="off">
        
        <button id="sendBtn">↑</button>
    </div>

</div>

<script src="../script.js"></script>

</body>
</html>
